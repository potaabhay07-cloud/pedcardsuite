<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>PedCardSuite — CHD Anatomy Atlas</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    background: #0f1117;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useCallback } = React;

const DEFECTS = {
  vsd:     { name:"VSD", full:"Ventricular Septal Defect", group:"Septal", color:"#d44",
             desc:"Hole in the wall between the two lower chambers. Extra blood flows left→right, flooding the lungs.",
             fix:"Patch closure of the VSD with fabric or pericardial tissue." },
  asd:     { name:"ASD", full:"Atrial Septal Defect", group:"Septal", color:"#d44",
             desc:"Hole in the wall between the two upper chambers. Extra blood flows left→right, overloading the right heart.",
             fix:"Patch closure (surgical) or catheter device closure." },
  ps:      { name:"PS", full:"Pulmonary Stenosis", group:"Obstructive", color:"#e07020",
             desc:"Pulmonary valve/RVOT is narrowed. RV must squeeze harder to push blood to the lungs.",
             fix:"Balloon valvuloplasty or surgical relief of RVOT obstruction." },
  as:      { name:"AS", full:"Aortic Stenosis", group:"Obstructive", color:"#e07020",
             desc:"Aortic valve is narrowed. LV must squeeze much harder to push blood to the body. LV muscle thickens.",
             fix:"Balloon valvuloplasty or surgical valve repair/replacement." },
  pda:     { name:"PDA", full:"Patent Ductus Arteriosus", group:"Connections", color:"#9b6bb0",
             desc:"Fetal vessel between aorta and PA stays open after birth. Extra blood flows aorta→PA, flooding lungs.",
             fix:"Catheter coil/plug or surgical ligation to close the ductus." },
  coa:     { name:"CoA", full:"Coarctation of Aorta", group:"Obstructive", color:"#e07020",
             desc:"Narrowing in the descending aorta. High BP in arms, low BP and weak pulses in legs.",
             fix:"End-to-end surgical repair or balloon dilation." },
  ebstein: { name:"Ebstein", full:"Ebstein's Anomaly", group:"Valve", color:"#c040a0",
             desc:"Tricuspid valve displaced downward into RV. Part of RV becomes 'atrialized' and small. TV leaks.",
             fix:"Cone repair: leaflets detached, rotated and reattached at true annulus. Atrialized RV plicated." },
  tga:     { name:"d-TGA", full:"d-Transposition of Great Arteries", group:"Complex", color:"#2070c0",
             desc:"Aorta and PA are swapped. Aorta from RV (blue→body), PA from LV (red→lungs). Two parallel loops.",
             fix:"Arterial Switch Operation (Jatene): arteries cut and reconnected correctly. Coronaries transferred." },
  tapvr:   { name:"TAPVR", full:"Total Anomalous Pulmonary Venous Return", group:"Complex", color:"#2070c0",
             desc:"All pulmonary veins drain to the right atrium instead of left. Body gets mixed blood. Child is blue.",
             fix:"Pulmonary veins redirected to drain into the left atrium. ASD closed." },
  avsd:    { name:"AVSD", full:"AV Septal Defect (Complete)", group:"Septal", color:"#d44",
             desc:"Large central hole with a common AV valve instead of separate mitral and tricuspid. Blood mixes freely.",
             fix:"Patch ASD+VSD components, divide common valve into two separate valves (TV and MV)." },
  truncus: { name:"Truncus", full:"Truncus Arteriosus", group:"Complex", color:"#2070c0",
             desc:"Single large artery (truncus) arises from both ventricles instead of separate Ao and PA. Always has a VSD. PA branches arise from the truncus. Mixed blood goes to both body and lungs.",
             fix:"Rastelli repair: VSD patched to direct LV→truncal valve (becomes neo-aorta). PA branches detached and connected to RV via a conduit (RV-PA conduit)." },
  pa_atresia:{ name:"PA-Atresia", full:"Pulmonary Atresia", group:"Complex", color:"#2070c0",
             desc:"Pulmonary valve is completely closed (atretic). No blood can flow from RV to PA. Lungs receive blood only through PDA or collaterals. Without VSD, RV is small (PA/IVS). With VSD, similar to severe TOF.",
             fix:"PA/IVS: staged — BT shunt → RVOT reconstruction or single-ventricle pathway if RV too small. PA/VSD: complete repair with RV-PA conduit and VSD closure." },
  ta:      { name:"TA", full:"Tricuspid Atresia", group:"Complex", color:"#2070c0",
             desc:"Tricuspid valve is completely absent. No blood can flow from RA to RV. RV is very small/hypoplastic. Blood must cross an ASD (RA→LA) and reach the lungs via VSD or PDA.",
             fix:"Single-ventricle palliation: Stage 1 BT shunt (neonate) → Stage 2 Glenn/Hemi-Fontan (4-6 mo) → Stage 3 Fontan completion (2-4 yr). SVC and IVC connected directly to PA." },
  ma:      { name:"MA", full:"Mitral Atresia", group:"Complex", color:"#2070c0",
             desc:"Mitral valve is completely absent. No blood can flow from LA to LV. LV is small/hypoplastic. Pulmonary venous blood must cross an ASD (LA→RA) and mix in the right heart.",
             fix:"Single-ventricle palliation (Norwood/Glenn/Fontan pathway) since the LV cannot support systemic circulation." },
  hlhs:    { name:"HLHS", full:"Hypoplastic Left Heart Syndrome", group:"Complex", color:"#c02020",
             desc:"Left heart structures severely underdeveloped — small LV, atretic/stenotic mitral and aortic valves, hypoplastic ascending aorta. Entire systemic circulation depends on RV via PDA. Fatal without intervention.",
             fix:"Staged palliation: Stage 1 Norwood (neonatal — RV becomes systemic ventricle, neo-aorta constructed, BT shunt) → Stage 2 Glenn (4-6 mo) → Stage 3 Fontan (2-4 yr). Or heart transplant." },
  iivc:    { name:"Int.IVC", full:"Interrupted Inferior Vena Cava", group:"Connections", color:"#9b6bb0",
             desc:"IVC does not connect directly to the right atrium. Lower body venous blood drains via the azygos vein into the SVC and then to RA. Often seen with left atrial isomerism (polysplenia/heterotaxy).",
             fix:"Usually no surgical correction needed for the IVC itself. Important to recognize during cardiac catheterization and Fontan planning — may require bilateral SVC connections." },
  iaa:     { name:"IAA", full:"Interrupted Aortic Arch", group:"Obstructive", color:"#e07020",
             desc:"Complete discontinuity of the aortic arch. Upper body supplied by ascending aorta, lower body depends entirely on PDA from PA. Three types: A (beyond L subclavian), B (between L carotid & L subclavian — commonest, associated with DiGeorge), C (between innominate & L carotid).",
             fix:"Primary repair: direct anastomosis of the two aortic segments + VSD closure (usually present). PGE1 to keep PDA open pre-operatively." },
};

const DEFECT_IDS = Object.keys(DEFECTS);

const PRESETS = [
  { label:"Normal Heart", ids:[], desc:"Healthy four-chamber anatomy" },
  { label:"Isolated VSD", ids:["vsd"] },
  { label:"Isolated ASD", ids:["asd"] },
  { label:"VSD + ASD", ids:["vsd","asd"] },
  { label:"TOF (VSD+PS)", ids:["vsd","ps"], desc:"Tetralogy of Fallot physiology" },
  { label:"VSD + PDA", ids:["vsd","pda"] },
  { label:"VSD + PS + PDA", ids:["vsd","ps","pda"] },
  { label:"VSD + CoA", ids:["vsd","coa"] },
  { label:"VSD + CoA + PDA", ids:["vsd","coa","pda"] },
  { label:"ASD + PS", ids:["asd","ps"] },
  { label:"Complete AVSD", ids:["avsd"] },
  { label:"AVSD + PDA", ids:["avsd","pda"] },
  { label:"Ebstein + ASD", ids:["ebstein","asd"] },
  { label:"d-TGA", ids:["tga"] },
  { label:"d-TGA + VSD", ids:["tga","vsd"] },
  { label:"d-TGA + VSD + PS", ids:["tga","vsd","ps"] },
  { label:"TAPVR", ids:["tapvr"] },
  { label:"CoA + AS", ids:["coa","as"] },
  { label:"Truncus Arteriosus", ids:["truncus"], desc:"Single outflow + obligatory VSD" },
  { label:"PA/IVS", ids:["pa_atresia"], desc:"Pulmonary atresia, intact ventricular septum" },
  { label:"PA/VSD", ids:["pa_atresia","vsd"], desc:"Pulmonary atresia with VSD (severe TOF)" },
  { label:"PA/VSD + PDA", ids:["pa_atresia","vsd","pda"] },
  { label:"Tricuspid Atresia", ids:["ta","asd"], desc:"Classic TA with obligatory ASD" },
  { label:"TA + VSD", ids:["ta","asd","vsd"], desc:"Tricuspid atresia with VSD" },
  { label:"TA + VSD + PS", ids:["ta","asd","vsd","ps"], desc:"TA, restrictive VSD, PS" },
  { label:"Mitral Atresia", ids:["ma","asd"], desc:"MA with obligatory ASD" },
  { label:"HLHS", ids:["hlhs"], desc:"Hypoplastic left heart syndrome" },
  { label:"HLHS + CoA", ids:["hlhs","coa"] },
  { label:"Interrupted IVC", ids:["iivc"], desc:"Azygos continuation, heterotaxy" },
  { label:"IAA + VSD", ids:["iaa","vsd"], desc:"Interrupted aortic arch + VSD" },
  { label:"IAA + VSD + PDA", ids:["iaa","vsd","pda"], desc:"IAA with PDA-dependent lower body" },
  { label:"Custom...", ids:null, desc:"Build your own combination" },
];

const K = {
  B:"#4a8fd9", R:"#e24545", P:"#9b6bb0", G:"#3da03d",
  WS:"#8b7355", bgB:"#d4e4f4", bgR:"#f4d4d8", bgM:"#e4d8f0",
};
const HX=80,HY=65,HW=160,HH=180,SEP=160,AV=148,BOT=245;

const Tx = ({x,y,t,c="#333",s=11,b,a="middle"}) => (
  <text x={x} y={y} textAnchor={a} fill={c} fontSize={s} fontWeight={b?700:500} fontFamily="'IBM Plex Mono',monospace">{t}</text>
);

const Arr = ({pts,c,lab,lp}) => {
  const d=pts.map((p,i)=>`${i?"L":"M"}${p[0]},${p[1]}`).join(" ");
  const[a,b]=[pts[pts.length-2],pts[pts.length-1]];
  const ang=Math.atan2(b[1]-a[1],b[0]-a[0]),sz=6;
  return(<g>
    <path d={d} fill="none" stroke={c} strokeWidth={2.2} strokeLinecap="round" strokeLinejoin="round" opacity={.75} strokeDasharray="7,4">
      <animate attributeName="stroke-dashoffset" from="44" to="0" dur="2s" repeatCount="indefinite"/>
    </path>
    <polygon points={`${b[0]},${b[1]} ${b[0]-sz*Math.cos(ang-.4)},${b[1]-sz*Math.sin(ang-.4)} ${b[0]-sz*Math.cos(ang+.4)},${b[1]-sz*Math.sin(ang+.4)}`} fill={c} opacity={.75}/>
    {lab&&lp&&<Tx x={lp[0]} y={lp[1]} t={lab} c={c} s={8} b/>}
  </g>);
};

function getChamberColors(active, post) {
  let ra=K.bgB, la=K.bgR, rv=K.bgB, lv=K.bgR;
  if (post) return {ra,la,rv,lv};
  if (active.has("vsd")||active.has("truncus")) rv = K.bgM;
  if (active.has("asd")) ra = K.bgM;
  if (active.has("avsd")) { ra=K.bgM; rv=K.bgM; la="#f0d8e8"; lv="#f0d8e8"; }
  if (active.has("tapvr")) { ra=K.bgM; la="#e8e8e8"; }
  if (active.has("ebstein") && !post) { rv="#e8ddf4"; }
  if (active.has("ta")) { rv="#e0e0e0"; ra=K.bgM; la=K.bgM; }
  if (active.has("ma")||active.has("hlhs")) { lv="#e0e0e0"; la=K.bgM; ra=K.bgM; }
  return {ra,la,rv,lv};
}

const BaseHeart = ({active, post}) => {
  const cc = getChamberColors(active, post);
  const isAVSD = active.has("avsd") && !post;
  const isEbst = active.has("ebstein") && !post;
  const isTA = active.has("ta") && !post;
  const isMA = (active.has("ma")||active.has("hlhs")) && !post;
  const isTruncus = active.has("truncus") && !post;
  const isIAA = active.has("iaa") && !post;
  const isIIVC = active.has("iivc") && !post;

  return (<g>
    {/* Chamber fills */}
    <rect x={HX+2} y={HY+2} width={SEP-HX-2} height={AV-HY-2} fill={cc.ra} opacity={.45}/>
    <rect x={SEP+2} y={HY+2} width={HX+HW-SEP-2} height={AV-HY-2} fill={cc.la} opacity={.45}/>
    {isEbst ? (<>
      <rect x={HX+2} y={AV+2} width={SEP-HX-2} height={35} fill={cc.rv} opacity={.2}/>
      <rect x={HX+2} y={AV+37} width={SEP-HX-2} height={BOT-AV-37} fill={cc.rv} opacity={.45}/>
    </>) : isTA ? (
      <rect x={HX+2} y={AV+2} width={SEP-HX-2} height={BOT-AV-2} fill={cc.rv} opacity={.15}/>
    ) : (
      <rect x={HX+2} y={AV+2} width={SEP-HX-2} height={BOT-AV-2} fill={cc.rv} opacity={.45}/>
    )}
    {isMA ? (
      <rect x={SEP+2} y={AV+2} width={HX+HW-SEP-2} height={BOT-AV-2} fill={cc.lv} opacity={.15}/>
    ) : (
      <rect x={SEP+2} y={AV+2} width={HX+HW-SEP-2} height={BOT-AV-2} fill={cc.lv} opacity={.45}/>
    )}

    {/* Walls */}
    <rect x={HX} y={HY} width={HW} height={HH} fill="none" stroke={K.WS} strokeWidth={3}/>
    {isAVSD ? (<>
      <line x1={SEP} y1={HY} x2={SEP} y2={93} stroke={K.WS} strokeWidth={3}/>
      <line x1={SEP} y1={172} x2={SEP} y2={BOT} stroke={K.WS} strokeWidth={3}/>
      <line x1={HX} y1={AV} x2={128} y2={AV} stroke={K.WS} strokeWidth={2.5}/>
      <line x1={192} y1={AV} x2={HX+HW} y2={AV} stroke={K.WS} strokeWidth={2.5}/>
    </>) : (<>
      <line x1={SEP} y1={HY} x2={SEP} y2={BOT} stroke={K.WS} strokeWidth={3}/>
      <line x1={HX} y1={AV} x2={HX+HW} y2={AV} stroke={K.WS} strokeWidth={2.5}/>
    </>)}

    {/* Veins */}
    <line x1={42} y1={85} x2={HX} y2={98} stroke={K.B} strokeWidth={5} strokeLinecap="round"/>
    <Tx x={36} y={83} t="SVC" c={K.B} s={8} b a="end"/>

    {isIIVC ? (<>
      <line x1={42} y1={145} x2={42} y2={115} stroke={K.B} strokeWidth={4} strokeLinecap="round" strokeDasharray="5,3"/>
      <line x1={42} y1={115} x2={42} y2={90} stroke={K.B} strokeWidth={4} strokeLinecap="round"/>
      <Tx x={28} y={150} t="IVC" c={K.B} s={8} b a="end"/>
      <Tx x={22} y={128} t="Azygos↑" c={K.P} s={7} b a="end"/>
    </>) : (<>
      <line x1={42} y1={132} x2={HX} y2={128} stroke={K.B} strokeWidth={5} strokeLinecap="round"/>
      <Tx x={36} y={135} t="IVC" c={K.B} s={8} b a="end"/>
    </>)}

    {active.has("tapvr") && !post ? (<>
      <path d="M278,90 Q278,105 260,118 L200,130 Q160,135 120,125 L82,108" fill="none" stroke={K.R} strokeWidth={4} strokeLinecap="round"/>
      <Tx x={284} y={88} t="PV" c={K.R} s={8} b a="start"/>
      <Tx x={SEP} y={80} t="PVs→RA" c="#d44" s={8} b/>
    </>) : (<>
      <line x1={278} y1={90} x2={HX+HW} y2={100} stroke={K.R} strokeWidth={5} strokeLinecap="round"/>
      <Tx x={284} y={88} t="PV" c={K.R} s={8} b a="start"/>
      <line x1={278} y1={125} x2={HX+HW} y2={122} stroke={K.R} strokeWidth={5} strokeLinecap="round"/>
    </>)}

    {/* Great arteries */}
    {isTruncus ? (<>
      <path d="M160,148 L160,42 Q160,22 160,10" fill="none" stroke={K.P} strokeWidth={9} strokeLinecap="round"/>
      <path d="M160,20 Q140,10 110,12" fill="none" stroke={K.P} strokeWidth={5} strokeLinecap="round"/>
      <path d="M160,20 Q180,10 210,12" fill="none" stroke={K.P} strokeWidth={5} strokeLinecap="round"/>
      <Tx x={160} y={-2} t="Truncus" c={K.P} s={9} b/>
      <Tx x={100} y={8} t="PA" c={K.B} s={7} b a="end"/>
      <Tx x={220} y={8} t="Ao" c={K.R} s={7} b a="start"/>
    </>) : active.has("tga") && !post ? (<>
      <path d="M125,148 L125,42 Q125,28 110,22 L72,12" fill="none" stroke={K.R} strokeWidth={7} strokeLinecap="round"/>
      <Tx x={62} y={14} t="Ao" c={K.R} s={10} b a="end"/>
      <path d="M195,148 L195,42 Q195,28 210,22 L248,12" fill="none" stroke={K.B} strokeWidth={7} strokeLinecap="round"/>
      <Tx x={256} y={14} t="PA" c={K.B} s={10} b a="start"/>
    </>) : (<>
      {!active.has("coa") && !isIAA ? (
        <path d="M195,148 L195,42 Q195,28 210,22 L248,12" fill="none" stroke={isMA?K.R:"#e24545"} strokeWidth={isMA?4:7} strokeLinecap="round"/>
      ) : null}
      {active.has("pa_atresia") && !post ? (
        <path d="M125,148 L125,42 Q125,28 110,22 L72,12" fill="none" stroke="#999" strokeWidth={7} strokeLinecap="round" strokeDasharray="2,6"/>
      ) : (
        <path d="M125,148 L125,42 Q125,28 110,22 L72,12" fill="none" stroke={K.B} strokeWidth={7} strokeLinecap="round"/>
      )}
      <Tx x={62} y={14} t="PA" c={active.has("pa_atresia")&&!post?"#999":K.B} s={10} b a="end"/>
      {!active.has("coa") && !isIAA && <Tx x={256} y={14} t="Ao" c={K.R} s={10} b a="start"/>}
    </>)}

    {/* Chamber labels */}
    <Tx x={120} y={114} t="RA" c={K.B} s={13} b/>
    <Tx x={200} y={114} t="LA" c={K.R} s={13} b/>
    {isTA ? (
      <Tx x={120} y={205} t="RV" c="#aaa" s={10} b/>
    ) : (
      <Tx x={120} y={205} t="RV" c={K.B} s={13} b/>
    )}
    {isMA ? (
      <Tx x={200} y={205} t="LV" c="#aaa" s={10} b/>
    ) : (
      <Tx x={200} y={205} t="LV" c={K.R} s={13} b/>
    )}
  </g>);
};

const layers = {
  vsd: (post) => post ? (<g key="vsd">
    <rect x={SEP-10} y={184} width={20} height={26} fill={K.G} stroke="#1a7a1a" strokeWidth={2}/>
    <Tx x={SEP} y={200} t="VSD✓" c="#fff" s={7} b/>
  </g>) : (<g key="vsd">
    <rect x={SEP-10} y={184} width={20} height={26} fill="#fff" stroke="#d44" strokeWidth={2} strokeDasharray="4,2"/>
    <Tx x={SEP} y={200} t="VSD" c="#d44" s={9} b/>
    <Arr pts={[[185,197],[SEP,197],[135,197]]} c={K.P} lab="L→R" lp={[SEP,180]}/>
  </g>),

  asd: (post) => post ? (<g key="asd">
    <rect x={SEP-10} y={97} width={20} height={22} fill={K.G} stroke="#1a7a1a" strokeWidth={2}/>
    <Tx x={SEP} y={111} t="ASD✓" c="#fff" s={7} b/>
  </g>) : (<g key="asd">
    <rect x={SEP-10} y={97} width={20} height={22} fill="#fff" stroke="#d44" strokeWidth={2} strokeDasharray="4,2"/>
    <Tx x={SEP} y={111} t="ASD" c="#d44" s={9} b/>
    <Arr pts={[[183,108],[SEP,108],[137,108]]} c={K.P} lab="L→R" lp={[SEP,93]}/>
  </g>),

  ps: (post) => post ? (<g key="ps">
    <rect x={118} y={AV-14} width={14} height={10} fill="none" stroke={K.G} strokeWidth={2}/>
    <Tx x={100} y={AV-18} t="PS open✓" c={K.G} s={7} b a="end"/>
  </g>) : (<g key="ps">
    <rect x={110} y={AV-7} width={30} height={5} fill="#e07020"/>
    <Tx x={97} y={AV-12} t="PS ✕" c="#e07020" s={8} b a="end"/>
  </g>),

  as: (post) => post ? (<g key="as">
    <rect x={188} y={AV-14} width={14} height={10} fill="none" stroke={K.G} strokeWidth={2}/>
    <Tx x={218} y={AV-18} t="AS open✓" c={K.G} s={7} b a="start"/>
  </g>) : (<g key="as">
    <rect x={182} y={AV-7} width={30} height={5} fill="#e07020"/>
    <Tx x={225} y={AV-12} t="AS ✕" c="#e07020" s={8} b a="start"/>
  </g>),

  pda: (post) => post ? (<g key="pda">
    <line x1={88} y1={12} x2={235} y2={12} stroke="#bbb" strokeWidth={3} strokeDasharray="4,3"/>
    <rect x={148} y={6} width={24} height={12} fill={K.G} stroke="#1a7a1a" strokeWidth={1.5}/>
    <Tx x={160} y={15} t="Shut" c="#fff" s={7} b/>
  </g>) : (<g key="pda">
    <path d="M88,12 Q160,-6 235,12" fill="none" stroke={K.P} strokeWidth={5} strokeLinecap="round"/>
    <Tx x={160} y={-3} t="PDA" c="#d44" s={10} b/>
    <Arr pts={[[225,12],[185,2],[135,2],[95,12]]} c={K.R} lab="Ao→PA" lp={[160,-14]}/>
  </g>),

  coa: (post) => {
    const base = "M195,148 L195,42 Q195,28 210,22 L248,12 Q272,6 286,22 L298,52 L298,";
    return post ? (<g key="coa">
      <path d={base+"78 L298,125 L298,185"} fill="none" stroke={K.R} strokeWidth={7} strokeLinecap="round"/>
      <Tx x={256} y={14} t="Ao" c={K.R} s={10} b a="start"/>
      <rect x={289} y={82} width={18} height={18} fill="none" stroke={K.G} strokeWidth={2.5}/>
      <Tx x={314} y={95} t="Fixed✓" c={K.G} s={7} b a="start"/>
      <Arr pts={[[298,130],[298,185]]} c={K.R}/>
    </g>) : (<g key="coa">
      <path d={base+"78"} fill="none" stroke={K.R} strokeWidth={7} strokeLinecap="round"/>
      <path d="M298,78 Q293,95 298,112" fill="none" stroke={K.R} strokeWidth={3} strokeLinecap="round"/>
      <path d="M298,112 L298,135 L298,185" fill="none" stroke={K.R} strokeWidth={7} strokeLinecap="round"/>
      <Tx x={256} y={14} t="Ao" c={K.R} s={10} b a="start"/>
      <rect x={286} y={80} width={24} height={30} fill="none" stroke="#e07020" strokeWidth={2.5}/>
      <Tx x={318} y={99} t="CoA ✕" c="#e07020" s={8} b a="start"/>
      <Arr pts={[[298,135],[298,185]]} c={K.R} lab="Weak↓" lp={[316,170]}/>
    </g>);
  },

const CONFLICTS = {
  avsd: ["asd","vsd"],
  hlhs: ["ma","as"],
  truncus: ["tga"],
};
function resolveConflicts(ids) {
  let s = new Set(ids);
  for (const [k, blocked] of Object.entries(CONFLICTS)) {
    if (s.has(k)) blocked.forEach(b => s.delete(b));
  }
  return s;
}

            {[["RA","Right Atrium"],["LA","Left Atrium"],["RV","Right Ventricle"],["LV","Left Ventricle"],["PA","Pulmonary Artery"],["Ao","Aorta"],["PV","Pulmonary Veins"],["SVC","Sup. Vena Cava"],["IVC","Inf. Vena Cava"],["TV","Tricuspid Valve"],["MV","Mitral Valve"],["RVOT","RV Outflow Tract"],["AV","Atrioventricular"],["aRV","Atrialized RV"],["CoA","Coarctation"],["IAA","Interrupted Arch"],["HLHS","Hypo. Left Heart"],["TA","Tricuspid Atresia"],["MA","Mitral Atresia"],["PDA","Patent Ductus"]].map(([a,f])=>(
              <div key={a}><strong style={{color:"#1a1a1a"}}>{a}</strong> — {f}</div>
            ))}
          </div>
        </div>
      </div>
      <div style={{textAlign:"center",fontSize:9,color:"#bbb",padding:"10px 20px",letterSpacing:1}}>
        CHD ANATOMY ATLAS · COMPOSABLE MULTI-DEFECT · FOR PATIENT EDUCATION
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
